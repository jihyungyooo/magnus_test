<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Artist Archive</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fff;
        --fg: #0a0a0a;
        --muted: #777;
        --line: #d7d7d7;
        --soft: #f6f6f6;
        --focus: #111;
        --max: 1320px;
        --display-font: "New York Large", "New York", "Iowan Old Style", Georgia, serif;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
          "Helvetica Neue", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-size: 15px;
        line-height: 1.42;
        letter-spacing: 0;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button,
      a {
        color: inherit;
      }

      a {
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
      }

      .frame {
        max-width: var(--max);
        margin: 0 auto;
        padding: 0 28px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(255, 255, 255, 0.94);
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(12px);
      }

      .nav {
        display: grid;
        grid-template-columns: minmax(140px, 1fr) auto minmax(140px, 1fr);
        align-items: center;
        min-height: 44px;
        gap: 24px;
      }

      .brand {
        font-weight: 560;
        text-decoration: none;
        min-width: 0;
      }

      .nav-center,
      .nav-right {
        display: flex;
        align-items: center;
        gap: 28px;
      }

      .nav-center {
        justify-content: center;
      }

      .nav-right {
        justify-content: flex-end;
      }

      .nav a,
      .nav button {
        border: 0;
        background: transparent;
        padding: 0;
        color: #8a8a8a;
        cursor: pointer;
        font-weight: 520;
        text-decoration: none;
        white-space: nowrap;
      }

      .nav a:hover,
      .nav button:hover,
      .nav .active {
        color: var(--fg);
      }

      .search-panel {
        display: none;
        border-top: 1px solid var(--line);
        background: #fff;
      }

      .search-panel.open {
        display: block;
      }

      .search-form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        padding: 16px 0;
        border-bottom: 1px solid var(--line);
      }

      .search-form input {
        border: 0;
        border-radius: 0;
        padding: 6px 0;
        font-size: 18px;
      }

      .search-form button {
        border: 0;
        background: transparent;
        color: #777;
        cursor: pointer;
      }

      .search-results {
        display: grid;
        gap: 0;
        max-height: min(56vh, 520px);
        overflow: auto;
        padding-bottom: 10px;
      }

      .search-result {
        display: grid;
        grid-template-columns: 140px 1fr;
        gap: 24px;
        width: 100%;
        border: 0;
        border-bottom: 1px solid var(--line);
        background: transparent;
        padding: 14px 0;
        text-align: left;
        cursor: pointer;
      }

      .search-result span {
        color: #777;
      }

      .search-result strong {
        display: block;
        margin-bottom: 4px;
        font-family: var(--display-font);
        font-size: 18px;
        font-weight: 520;
      }

      .search-result small {
        display: block;
        color: #555;
        font-size: 13px;
      }

      .search-empty {
        padding: 18px 0 22px;
        color: #777;
      }

      .page {
        display: none;
      }

      .page.active {
        display: block;
      }

      .home-collage {
        min-height: calc(100vh - 44px);
      }

      .home-collage .hero-inner {
        display: grid;
        grid-template-columns: 1fr;
        min-height: calc(100vh - 44px);
        padding: 28px 0;
        place-items: center;
      }

      .collage-stage {
        position: relative;
        width: min(76vh, 76vw, 760px);
        aspect-ratio: 1;
        margin: 0 auto;
      }

      .collage-piece {
        position: absolute;
        left: var(--x);
        top: var(--y);
        width: var(--size);
        aspect-ratio: var(--ratio);
        border: 0;
        background: transparent;
        padding: 0;
        transform: translate(-50%, -50%) rotate(var(--rotate));
        cursor: pointer;
        clip-path: var(--clip);
        overflow: hidden;
      }

      .collage-piece img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: var(--focus);
        transform: scale(var(--zoom));
        transition: transform 260ms ease;
      }

      .collage-piece:hover img,
      .collage-piece:focus-visible img {
        transform: scale(calc(var(--zoom) + 0.08));
      }

      .hero-inner {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 48px;
        min-height: 320px;
        align-items: end;
        padding-top: 56px;
        padding-bottom: 34px;
      }

      h1 {
        margin: 0;
        max-width: 820px;
        font-family: var(--display-font);
        font-size: clamp(34px, 4.6vw, 64px);
        line-height: 1;
        letter-spacing: 0;
        font-weight: 560;
      }

      .intro {
        max-width: 520px;
        margin: 0;
        color: #222;
        font-size: 16px;
      }

      .section-head {
        display: block;
        align-items: baseline;
        padding: 24px 0 14px;
        border-bottom: 1px solid var(--line);
      }

      .page-title {
        padding: 42px 0 22px;
        border-bottom: 1px solid var(--line);
      }

      .page-title h1 {
        font-family: var(--display-font);
        font-size: clamp(32px, 4.2vw, 52px);
        font-weight: 520;
      }

      .section-head h2 {
        margin: 0;
        font-family: var(--display-font);
        font-size: 15px;
        font-weight: 560;
      }

      .section-tools {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 24px;
        min-width: 0;
      }

      .filters {
        display: flex;
        gap: 22px;
        overflow-x: auto;
        color: #9a9a9a;
        font-weight: 500;
        min-width: 0;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }

      .filters::-webkit-scrollbar {
        display: none;
      }

      .filters button {
        flex: 0 0 auto;
        border: 0;
        padding: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
      }

      .filters .selected {
        color: var(--fg);
      }

      .view-options {
        display: flex;
        flex: 0 0 auto;
        border: 1px solid var(--line);
        border-radius: 4px;
        overflow: hidden;
      }

      .view-options button {
        border: 0;
        background: transparent;
        width: 32px;
        height: 26px;
        display: grid;
        place-items: center;
        padding: 0;
        color: #777;
        cursor: pointer;
      }

      .view-options button + button {
        border-left: 1px solid var(--line);
      }

      .view-options .selected {
        background: #f3f3f3;
        color: var(--fg);
      }

      .view-icon {
        width: 14px;
        height: 14px;
        display: block;
      }

      .view-icon rect,
      .view-icon line,
      .view-icon path {
        stroke: currentColor;
        stroke-width: 1.5;
        fill: none;
      }

      .index-list {
        padding: 16px 0 70px;
      }

      .index-row {
        display: grid;
        gap: 24px;
        padding: 14px 0;
        border-bottom: 1px solid var(--line);
        cursor: pointer;
      }

      .work-row {
        grid-template-columns: minmax(260px, 1.35fr) minmax(180px, 0.95fr) minmax(170px, 0.8fr) minmax(110px, 0.45fr) minmax(70px, 0.28fr);
      }

      .exhibition-row {
        grid-template-columns: minmax(260px, 1.25fr) minmax(190px, 0.75fr) minmax(260px, 1fr) minmax(120px, 0.45fr);
      }

      .index-row strong {
        font-family: var(--display-font);
        font-size: 15px;
        font-weight: 520;
        line-height: 1.22;
        overflow-wrap: anywhere;
      }

      .index-row span {
        color: #333;
        font-size: 15px;
        line-height: 1.22;
        overflow-wrap: anywhere;
      }

      .index-row .muted {
        color: #777;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 48px 62px;
        padding: 28px 0 68px;
      }

      .work-card {
        min-width: 0;
        cursor: pointer;
      }

      .thumb {
        width: 100%;
        display: block;
        margin-bottom: 16px;
        border: 0;
        background: transparent;
        overflow: visible;
      }

      .thumb img {
        display: block;
        width: 100%;
        height: auto;
      }

      .no-image {
        color: #aaa;
        font-size: 13px;
      }

      .kicker {
        margin: 0 0 8px;
        font-size: 13px;
        color: #202020;
      }

      .work-card h3,
      .list-item h3 {
        margin: 0;
        font-family: var(--display-font);
        font-size: 20px;
        line-height: 1.14;
        font-weight: 560;
      }

      .meta {
        margin: 12px 0 0;
        color: #222;
        white-space: pre-line;
        font-size: 14px;
      }

      .desc {
        margin: 12px 0 0;
        color: #202020;
        font-size: 14px;
      }

      .list {
        padding: 18px 0 70px;
      }

      .list-item {
        display: grid;
        grid-template-columns: minmax(170px, 0.35fr) minmax(0, 1fr);
        gap: 28px;
        padding: 22px 0;
        border-bottom: 1px solid var(--line);
      }

      .list-item[role="button"] {
        cursor: pointer;
      }

      .exhibition-item {
        grid-template-columns: minmax(130px, 0.22fr) minmax(0, 0.42fr) minmax(0, 1fr);
        align-items: start;
      }

      .poster {
        display: block;
        width: 100%;
        max-width: 180px;
        height: auto;
      }

      .exhibition-gallery {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 16px;
      }

      .exhibition-gallery img {
        display: block;
        width: 100%;
        height: auto;
      }

      .source-link {
        display: inline-block;
        margin-top: 14px;
        color: #777;
        font-size: 13px;
      }

      .address {
        margin: 10px 0 0;
        color: #555;
        font-size: 14px;
      }

      .detail {
        padding: 24px 0 78px;
      }

      .detail-back {
        border: 0;
        background: transparent;
        padding: 0;
        color: #777;
        cursor: pointer;
        margin-bottom: 26px;
      }

      .detail-layout {
        display: grid;
        grid-template-columns: minmax(220px, 0.42fr) minmax(0, 1fr);
        gap: 44px;
        align-items: start;
      }

      .detail-media img {
        display: block;
        width: 100%;
        height: auto;
      }

      .media-carousel {
        display: grid;
        gap: 10px;
      }

      .carousel-frame {
        position: relative;
        overflow: hidden;
      }

      .carousel-track {
        display: flex;
        transition: transform 220ms ease;
      }

      .carousel-slide {
        flex: 0 0 100%;
      }

      .carousel-slide img {
        display: block;
        width: 100%;
        height: auto;
      }

      .carousel-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: #777;
        font-size: 13px;
      }

      .carousel-controls button {
        border: 0;
        background: transparent;
        padding: 0;
        color: inherit;
        cursor: pointer;
      }

      .detail-copy h2 {
        margin: 0;
        font-family: var(--display-font);
        font-size: clamp(28px, 4vw, 48px);
        line-height: 1;
        font-weight: 520;
      }

      .detail-meta {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px 28px;
        margin: 28px 0;
        padding: 18px 0;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
      }

      .detail-meta span {
        display: block;
        color: #777;
        font-size: 13px;
        margin-bottom: 4px;
      }

      .detail-text {
        max-width: 780px;
        font-size: 16px;
        line-height: 1.5;
      }

      .detail-gallery {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-top: 28px;
      }

      .detail-gallery img {
        display: block;
        width: 100%;
        height: auto;
      }

      .work-gallery {
        margin-top: 28px;
      }

      .date {
        color: #777;
        font-weight: 500;
      }

      .bio {
        display: grid;
        grid-template-columns: minmax(170px, 0.35fr) minmax(0, 1fr);
        gap: 28px;
        padding: 34px 0 78px;
      }

      .bio p {
        max-width: 760px;
        margin: 0 0 18px;
        font-size: 17px;
        line-height: 1.48;
      }

      .footer {
        border-top: 1px solid var(--line);
        padding: 24px 0 42px;
        color: #777;
      }

      .studio {
        display: none;
        background: #fff;
      }

      .studio.active {
        display: block;
      }

      .site.hidden {
        display: none;
      }

      .studio-login {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
      }

      .login-card {
        width: min(100%, 420px);
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        padding: 26px 0 30px;
      }

      .login-card h1 {
        margin-bottom: 22px;
        font-size: 36px;
      }

      .login-error {
        min-height: 20px;
        margin: 0;
        color: #9b1c1c;
        font-size: 13px;
      }

      .studio-app {
        min-height: 100vh;
      }

      .studio-login.hidden,
      .studio-app.hidden,
      .site-logout.hidden {
        display: none;
      }

      .studio-top {
        position: sticky;
        top: 0;
        z-index: 5;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 18px;
        align-items: center;
        padding: 18px 28px 0;
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--line);
      }

      .studio-top h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1;
      }

      .studio-actions {
        display: flex;
        gap: 14px;
        align-items: center;
      }

      .icon-btn {
        border: 0;
        background: transparent;
        padding: 4px;
        cursor: pointer;
        color: #777;
      }

      .icon-btn:hover {
        color: var(--fg);
      }

      .studio-tabs {
        grid-column: 1 / -1;
        display: flex;
        gap: 24px;
        overflow-x: auto;
        padding-top: 16px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }

      .studio-tabs::-webkit-scrollbar {
        display: none;
      }

      .studio-tabs button {
        flex: 0 0 auto;
        border: 0;
        background: transparent;
        padding: 0 0 13px;
        color: #777;
        cursor: pointer;
      }

      .studio-tabs .picked {
        color: var(--fg);
        font-weight: 560;
      }

      .panel {
        padding: 28px 34px 70px;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding-bottom: 24px;
        border-bottom: 1px solid var(--line);
      }

      .panel-head h1 {
        font-size: 30px;
        line-height: 1.05;
        font-weight: 560;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .btn {
        min-height: 38px;
        border: 1px solid var(--fg);
        border-radius: 4px;
        background: var(--fg);
        color: #fff;
        padding: 8px 12px;
        cursor: pointer;
      }

      .btn.secondary {
        background: #fff;
        color: var(--fg);
      }

      .btn.danger {
        border-color: #aaa;
        background: #fff;
        color: #555;
      }

      .btn:disabled {
        border-color: #cfcfcf;
        background: #f4f4f4;
        color: #999;
        cursor: default;
      }

      .editor {
        display: grid;
        grid-template-columns: minmax(260px, 0.82fr) minmax(360px, 1.18fr);
        gap: 28px;
        padding-top: 24px;
      }

      .admin-table-wrap {
        overflow-x: auto;
        padding-top: 18px;
      }

      .admin-table {
        width: 100%;
        min-width: 760px;
        border-collapse: collapse;
        table-layout: fixed;
      }

      .admin-table th,
      .admin-table td {
        border-bottom: 1px solid var(--line);
        padding: 13px 12px;
        text-align: left;
        vertical-align: top;
        font-size: 14px;
        font-weight: 420;
      }

      .admin-table th {
        color: #777;
        font-weight: 560;
      }

      .admin-table tbody tr {
        cursor: pointer;
      }

      .admin-table tbody tr:hover {
        background: #fafafa;
      }

      .admin-table .title-cell {
        font-family: var(--display-font);
        font-size: 15px;
        font-weight: 520;
      }

      .row-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .text-btn {
        border: 0;
        background: transparent;
        padding: 0;
        color: #777;
        cursor: pointer;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .text-btn:hover {
        color: var(--fg);
      }

      .admin-modal {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: grid;
        place-items: center;
        padding: 28px;
        background: rgba(255, 255, 255, 0.68);
        backdrop-filter: blur(8px);
      }

      .admin-modal[hidden] {
        display: none;
      }

      .modal-card {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        width: min(920px, 100%);
        max-height: min(86vh, 900px);
        overflow: hidden;
        background: #fff;
        border: 1px solid var(--line);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.12);
      }

      .modal-head {
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 20px;
        background: #fff;
        border-bottom: 1px solid var(--line);
      }

      .modal-head h2 {
        margin: 0;
        font-family: var(--display-font);
        font-size: 24px;
        font-weight: 520;
      }

      .modal-body {
        overflow: auto;
        padding: 20px;
      }

      .modal-footer {
        position: sticky;
        bottom: 0;
        z-index: 1;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin: 18px -20px -20px;
        padding: 14px 20px;
        border-top: 1px solid var(--line);
        background: #fff;
      }

      .records {
        border-right: 1px solid var(--line);
        padding-right: 28px;
        display: grid;
        align-content: start;
        gap: 10px;
      }

      .record {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 4px;
        background: #fff;
        padding: 0;
        text-align: left;
        overflow: hidden;
      }

      .record.current {
        border-color: var(--fg);
      }

      .record-main {
        width: 100%;
        border: 0;
        background: transparent;
        padding: 13px 14px 10px;
        text-align: left;
        cursor: pointer;
      }

      .record-main strong {
        display: block;
        font-size: 16px;
        font-weight: 560;
      }

      .record-main span {
        display: block;
        margin-top: 3px;
        color: #777;
      }

      .record-meta {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
        margin-top: 8px;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 2px 8px;
        color: #777;
        font-size: 12px;
      }

      .status-pill.live {
        color: var(--fg);
        border-color: var(--fg);
      }

      .visibility-toggle {
        width: 100%;
        border: 0;
        border-top: 1px solid var(--line);
        background: #fafafa;
        padding: 8px 14px;
        text-align: left;
        color: #555;
        cursor: pointer;
      }

      .switch-row,
      .check-row {
        display: flex;
        grid-template-columns: none;
        gap: 9px;
        align-items: center;
        color: #333;
        font-size: 14px;
        font-weight: 520;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #333;
        font-size: 14px;
        font-weight: 520;
      }

      .toggle-row input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .toggle-track {
        position: relative;
        width: 42px;
        height: 24px;
        border: 1px solid #aaa;
        border-radius: 999px;
        background: #f2f2f2;
        transition: background 160ms ease, border-color 160ms ease;
      }

      .toggle-track::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #777;
        transition: transform 160ms ease, background 160ms ease;
      }

      .toggle-row input:checked + .toggle-track {
        border-color: var(--fg);
        background: var(--fg);
      }

      .toggle-row input:checked + .toggle-track::after {
        transform: translateX(18px);
        background: #fff;

        width: 100%;

        position: absolute;

        right: 6px;
        width: 24px;

        background: rgba(255, 255, 255, 0.92);

      function loadData() {
        try {
          const saved = localStorage.getItem(storeKey);
          if (!saved) return hydrateMediaData(initialData);
          return hydrateMediaData(JSON.parse(saved));
        } catch {
          return hydrateMediaData(initialData);

      function hydrateMediaData(content) {
        content.works = content.works.map((work) => {
          const images = uniqueImages(work.images || workImageSets[work.title] || (work.image ? [work.image] : []));
          return { ...work, visible: work.visible !== false, image: work.image || images[0] || "", images: images.slice(0, maxImagesPerItem) };
        });
        content.exhibitions = content.exhibitions.map((entry) => {
          const media = exhibitionImageSets[entry.title];
          const linkedTitles = exhibitionWorkLinks[entry.title] || [];
          const inferredWorkIds = linkedTitles
            .map((title) => content.works.find((work) => work.title === title)?.id)
            .filter(Boolean);
          const next = {
            ...entry,
            visible: entry.visible !== false,
            workIds: Array.isArray(entry.workIds) ? entry.workIds : inferredWorkIds,
            images: uniqueImages(entry.images || []).slice(0, maxImagesPerItem)
          };
          if (!media) return next;
          return { ...next, poster: media.poster || entry.poster, images: uniqueImages(entry.images || media.images || []).slice(0, maxImagesPerItem) };
        });
        return content;
      }

      function uniqueImages(images = []) {
        return [...new Set(images.filter(Boolean))];

      function seededRandom(seed) {
        return function random() {
          seed |= 0;
          seed = (seed + 0x6d2b79f5) | 0;
          let value = Math.imul(seed ^ (seed >>> 15), 1 | seed);
          value = (value + Math.imul(value ^ (value >>> 7), 61 | value)) ^ value;
          return ((value ^ (value >>> 14)) >>> 0) / 4294967296;
        };
      }

      function renderHomeCollage() {
        const target = document.getElementById("homeCollage");
        const works = publicWorks().filter((work) => work.image);
        if (!target || !works.length) return;
        const random = seededRandom(homeCollageSeed);
        const clips = [
          "polygon(9% 3%, 91% 0%, 99% 76%, 74% 100%, 4% 91%, 0% 22%)",
          "polygon(18% 0%, 96% 10%, 88% 92%, 26% 100%, 0% 72%, 6% 12%)",
          "polygon(3% 17%, 66% 0%, 100% 19%, 94% 80%, 31% 100%, 0% 70%)",
          "polygon(0% 8%, 82% 2%, 100% 52%, 78% 98%, 13% 91%, 4% 42%)",
          "polygon(22% 2%, 100% 0%, 88% 85%, 48% 100%, 0% 76%, 4% 18%)"
        ];
        const count = Math.max(28, Math.min(42, works.length * 2));
        const shuffled = [...works].sort(() => random() - 0.5);
        target.innerHTML = Array.from({ length: count }, (_, index) => {
          const work = shuffled[index % shuffled.length];
          const angle = (index / count) * Math.PI * 2 + (random() - 0.5) * 0.18;
          const radius = 37 + random() * 7;
          const x = 50 + Math.cos(angle) * radius;
          const y = 50 + Math.sin(angle) * radius;
          const size = 12 + random() * 8;
          const ratio = 0.78 + random() * 0.72;
          const rotate = (random() - 0.5) * 28;
          const focusX = 18 + random() * 64;
          const focusY = 18 + random() * 64;
          const zoom = 1.12 + random() * 0.34;
          return `
            <button
              class="collage-piece"
              type="button"
              data-slug="${escapeAttr(itemSlug(work))}"
              aria-label="${escapeAttr(work.title)}"
              style="--x:${x.toFixed(2)}%; --y:${y.toFixed(2)}%; --size:${size.toFixed(2)}%; --ratio:${ratio.toFixed(2)}; --rotate:${rotate.toFixed(2)}deg; --focus:${focusX.toFixed(0)}% ${focusY.toFixed(0)}%; --zoom:${zoom.toFixed(2)}; --clip:${clips[index % clips.length]};"
            >
              <img src="${escapeAttr(work.image)}" alt="">
            </button>
          `;
        }).join("");
      }

      function renderViewOptions() {
        document.querySelectorAll("[data-work-view]").forEach((button) => {
          button.classList.toggle("selected", button.dataset.workView === activeWorkView);
        });
        document.querySelectorAll("[data-exhibition-view]").forEach((button) => {
          button.classList.toggle("selected", button.dataset.exhibitionView === activeExhibitionView);
        });
      }

      function renderWorks() {
        const grid = document.getElementById("workGrid");
        const route = currentRoute();
        if (route.page === "works" && route.detail) {
          const work = publicWorks().find((item) => itemSlug(item) === route.detail);
          grid.className = "detail";
          grid.innerHTML = work ? renderWorkDetail(work) : `<div class="search-empty">Work not found.</div>`;
          return;
        }
        const works =
          activeWorkCategory === "All"
            ? publicWorks()
            : publicWorks().filter((work) => work.category === activeWorkCategory);
        if (activeWorkView === "list") {
          grid.className = "index-list";
          grid.innerHTML =
            works
              .map(
                (work) => `
                  <article class="index-row work-row" role="button" tabindex="0" data-slug="${escapeAttr(itemSlug(work))}">
                    <strong>${escapeHtml(work.title)}</strong>
                    <span>${escapeHtml(work.medium)}</span>
                    <span>${escapeHtml(work.dimensions)}</span>
                    <span class="muted">${escapeHtml(work.category)}</span>
                    <span class="muted">${escapeHtml(work.year)}</span>
                  </article>
                `
              )
              .join("") || `<div class="search-empty">No works in this category.</div>`;
          return;
        }
        grid.className = "grid";
        grid.innerHTML = "";
        works.forEach((work) => {
          const node = document.getElementById("workCardTemplate").content.cloneNode(true);
          const card = node.querySelector(".work-card");
          card.dataset.slug = itemSlug(work);
          card.setAttribute("role", "button");
          card.setAttribute("tabindex", "0");
          const thumb = node.querySelector(".thumb");
          thumb.innerHTML = work.image
            ? `<img src="${work.image}" alt="${escapeAttr(work.title)}">`
            : `<span class="no-image">Image reserved for artwork</span>`;
          node.querySelector(".kicker").textContent = [work.category, work.year].filter(Boolean).join(" · ");
          node.querySelector("h3").textContent = work.title;
          node.querySelector(".meta").textContent = [work.medium, work.dimensions].filter(Boolean).join("\n");
          node.querySelector(".desc").remove();
          grid.appendChild(node);
        });
      }

      function renderWorkDetail(work) {
        const images = uniqueImages(work.images?.length ? work.images : [work.image]);
        return `
          <button class="detail-back" type="button" data-back-to="works">← Works</button>
          <article class="detail-layout">
            <div class="detail-media">
              ${renderMediaCarousel(images, work.title)}
            </div>
            <div class="detail-copy">
              <p class="kicker">${escapeHtml([work.category, work.year].filter(Boolean).join(" · "))}</p>
              <h2>${escapeHtml(work.title)}</h2>
              <div class="detail-meta">
                <div><span>Medium</span>${escapeHtml(work.medium)}</div>
                <div><span>Dimensions</span>${escapeHtml(work.dimensions)}</div>
              </div>
              <p class="detail-text">${escapeHtml(work.description)}</p>
            </div>
          </article>
        `;
      }

      function renderMediaCarousel(images, title) {
        if (!images.length) return "";
        if (images.length === 1) return `<img src="${escapeAttr(images[0])}" alt="${escapeAttr(title)}">`;
        return `
          <div class="media-carousel" data-carousel data-current="0">
            <div class="carousel-frame">
              <div class="carousel-track" style="transform: translateX(0%);">
                ${images
                  .map(
                    (image, index) => `
                      <div class="carousel-slide">
                        <img src="${escapeAttr(image)}" alt="${escapeAttr(title)} image ${index + 1}">
                      </div>
                    `
                  )
                  .join("")}
              </div>
            </div>
            <div class="carousel-controls">
              <button type="button" data-carousel-prev>Prev</button>
              <span data-carousel-count>1 / ${images.length}</span>
              <button type="button" data-carousel-next>Next</button>
            </div>
          </div>
        `;
      }

      function renderEntryList(elementId, entries) {
        document.getElementById(elementId).innerHTML = entries
          .map(
            (entry) => `
              <article class="list-item">
                <div class="date">${escapeHtml(entry.date)}</div>
                <div>
                  <p class="kicker">${escapeHtml(entry.type)}</p>
                  <h3>${escapeHtml(entry.title)}</h3>
                  <p class="meta">${escapeHtml(entry.venue)}</p>
                  <p class="desc">${escapeHtml(entry.description)}</p>
                </div>
              </article>
            `
          )
          .join("");
      }

      function renderExhibitionList() {
        const target = document.getElementById("exhibitionList");
        const route = currentRoute();
        if (route.page === "exhibitions" && route.detail) {
          const entry = publicExhibitions().find((item) => itemSlug(item) === route.detail);
          target.className = "detail";
          target.innerHTML = entry ? renderExhibitionDetail(entry) : `<div class="search-empty">Exhibition not found.</div>`;
          return;
        }
        target.className = "list";
        const exhibitions =
          activeExhibitionFilter === "All"
            ? publicExhibitions()
            : publicExhibitions().filter((entry) => text(entry.type).toLowerCase().includes(activeExhibitionFilter.toLowerCase()));
        if (activeExhibitionView === "list") {
          target.className = "index-list";
          target.innerHTML =
            exhibitions
              .map(
                (entry) => `
                  <article class="index-row exhibition-row" role="button" tabindex="0" data-slug="${escapeAttr(itemSlug(entry))}">
                    <strong>${escapeHtml(entry.title)}</strong>
                    <span>${escapeHtml(entry.date)}</span>
                    <span>${escapeHtml(entry.venue)}</span>
                    <span class="muted">${escapeHtml(entry.type)}</span>
                  </article>
                `
              )
              .join("") || `<div class="search-empty">No exhibitions in this category.</div>`;
          return;
        }
        target.innerHTML = exhibitions
          .map(
            (entry) => `
              <article class="list-item exhibition-item" role="button" tabindex="0" data-slug="${escapeAttr(itemSlug(entry))}">
                <div>
                  ${entry.poster ? `<img class="poster" src="${escapeAttr(entry.poster)}" alt="${escapeAttr(entry.title)} poster">` : `<div class="date">${escapeHtml(entry.date)}</div>`}
                </div>
                <div>
                  <div class="date">${escapeHtml(entry.date)}</div>
                  <p class="meta">${escapeHtml(entry.venue)}</p>
                  ${entry.address ? `<p class="address">${escapeHtml(entry.address)}</p>` : ""}
                </div>
                <div>
                  <p class="kicker">${escapeHtml(entry.type)}</p>
                  <h3>${escapeHtml(entry.title)}</h3>
                </div>
              </article>
            `
          )
          .join("") || `<div class="search-empty">No exhibitions in this category.</div>`;
      }

      function renderExhibitionDetail(entry) {
        const images = uniqueImages([entry.poster, ...(entry.images || [])]);
        return `
          <button class="detail-back" type="button" data-back-to="exhibitions">← Exhibitions</button>
          <article class="detail-layout">
            <div class="detail-media">
              ${renderMediaCarousel(images, `${entry.title} poster`)}
            </div>
            <div class="detail-copy">
              <p class="kicker">${escapeHtml(entry.type)}</p>
              <h2>${escapeHtml(entry.title)}</h2>
              <div class="detail-meta">
                <div><span>Period</span>${escapeHtml(entry.date)}</div>
                <div><span>Venue</span>${escapeHtml(entry.venue)}</div>
                ${entry.address ? `<div><span>Address</span>${escapeHtml(entry.address)}</div>` : ""}
              </div>
              <p class="detail-text">${escapeHtml(entry.description)}</p>
              ${renderLinkedWorks(entry)}
              ${entry.link ? `<a class="source-link" href="${escapeAttr(entry.link)}" target="_blank" rel="noreferrer">Original exhibition page</a>` : ""}
            </div>
          </article>
        `;
      }

      function renderLinkedWorks(entry) {
        const linked = publicWorks().filter((work) => entry.workIds?.includes(work.id));
        if (!linked.length) return "";
        return `
          <div class="linked-works">
            <h3>Included Works</h3>
            <div class="linked-work-list">
              ${linked
                .map(
                  (work) => `
                    <button class="linked-work" type="button" data-work-slug="${escapeAttr(itemSlug(work))}">
                      <strong>${escapeHtml(work.title)}</strong>
                      <span class="muted">${escapeHtml([work.category, work.year].filter(Boolean).join(" · "))}</span>
                    </button>
                  `
                )
                .join("")}
            </div>
          </div>
        `;
      }

      function getSearchItems() {
        return [
          ...publicWorks().map((work) => ({
            page: "works",
            slug: itemSlug(work),
            type: work.category || "Work",
            title: work.title,
            detail: [work.year, work.medium, work.dimensions, work.description].filter(Boolean).join(" · ")
          })),
          ...publicExhibitions().map((entry) => ({
            page: "exhibitions",
            slug: itemSlug(entry),
            type: entry.type || "Exhibition",
            title: entry.title,
            detail: [entry.date, entry.venue, entry.address, entry.description].filter(Boolean).join(" · ")
          })),
          {
            page: "biography",
            type: "Biography",
            title: data.profile.name,
            detail: [data.profile.statement, data.profile.born, data.profile.bio].filter(Boolean).join(" · ")
          }
        ];
      }

      function renderSearchResults(query = "") {
        const target = document.getElementById("searchResults");
        const normalized = query.trim().toLowerCase();
        if (!normalized) {
          target.innerHTML = `<div class="search-empty">Type to search works, exhibitions, and biography.</div>`;
          return;
        }
        const results = getSearchItems().filter((item) =>
          [item.type, item.title, item.detail].join(" ").toLowerCase().includes(normalized)
        );
        target.innerHTML =
          results
            .map(
              (item) => `
                <button class="search-result" type="button" data-page-target="${escapeAttr(item.page)}" data-slug="${escapeAttr(item.slug || "")}">
                  <span>${escapeHtml(item.page)}</span>
                  <div>
                    <strong>${escapeHtml(item.title)}</strong>
                    <small>${escapeHtml(item.type)}${item.detail ? ` · ${escapeHtml(item.detail)}` : ""}</small>
                  </div>
                </button>
              `
            )
            .join("") || `<div class="search-empty">No results for “${escapeHtml(query)}”.</div>`;
      }

      function openSearch() {
        const panel = document.getElementById("searchPanel");
        panel.classList.add("open");
        panel.setAttribute("aria-hidden", "false");
        renderSearchResults(document.getElementById("searchInput").value);
        document.getElementById("searchInput").focus();
      }

      function closeSearch() {
        const panel = document.getElementById("searchPanel");
        panel.classList.remove("open");
        panel.setAttribute("aria-hidden", "true");
      }

      function renderAdmin() {
        if (!isStudioLoggedIn()) {
          renderStudioAccess();
          return;
        }
        renderStudioAccess();
        document.getElementById("panelTitle").textContent = tabTitle(adminTab);
        document.querySelectorAll("[data-admin-tab]").forEach((button) => {
          button.classList.toggle("picked", button.dataset.adminTab === adminTab);
        });
        if (adminTab === "profile") renderProfileAdmin();
        if (adminTab === "works") renderCollectionAdmin("works", blankWork);
        if (adminTab === "exhibitions") renderCollectionAdmin("exhibitions", blankEntry);
      }

      function tabTitle(tab) {
        return { profile: "Profile", works: "Works", exhibitions: "Exhibitions" }[tab];
      }

      function isStudioLoggedIn() {
        return sessionStorage.getItem(studioSessionKey) === "active";
      }

      function renderStudioAccess() {
        const loggedIn = isStudioLoggedIn();
        document.getElementById("studioLogin").classList.toggle("hidden", loggedIn);
        document.getElementById("studioApp").classList.toggle("hidden", !loggedIn);
        renderAuthControls();
      }

      function renderAuthControls() {
        document.getElementById("siteLogout")?.classList.toggle("hidden", !isStudioLoggedIn());
      }

      function renderProfileAdmin() {
        document.getElementById("panelActions").innerHTML = `<button class="btn secondary" type="button" id="resetData">Reset Sample</button>`;
        document.getElementById("adminPanel").innerHTML = `
          <div class="editor">
            <div class="records">
              <p class="note">작가명, 소개, 약력은 공개 홈페이지 전체에 바로 반영됩니다.</p>
            </div>
            <form id="profileForm">
              <label>Artist name<input name="name" value="${escapeAttr(data.profile.name)}" required></label>
              <label>Short statement<textarea name="statement" required>${escapeHtml(data.profile.statement)}</textarea></label>
              <label>Birth / location<input name="born" value="${escapeAttr(data.profile.born)}"></label>
              <label>Biography<textarea name="bio" required>${escapeHtml(data.profile.bio)}</textarea></label>
              <button class="btn" type="submit">Save Profile</button>
            </form>
          </div>
        `;
        document.getElementById("profileForm").addEventListener("submit", (event) => {
          event.preventDefault();
          data.profile = Object.fromEntries(new FormData(event.currentTarget));
          saveData("Profile saved and reflected.");
          renderAdmin();
        });
        document.getElementById("resetData").addEventListener("click", () => {
          if (!confirm("샘플 데이터로 되돌릴까요? 업로드한 이미지와 수정 내용이 사라집니다.")) return;
          data = hydrateMediaData(structuredClone(initialData));
          selected = { works: "", exhibitions: "" };
          saveData("Sample content restored.");
          renderAdmin();
        });
      }

      function renderCollectionAdmin(collection, blankFactory) {
        const items = data[collection];
        if (!selected[collection] || !items.some((item) => item.id === selected[collection])) {
          selected[collection] = "";
        }
        const current = items.find((item) => item.id === selected[collection]);
        document.getElementById("panelActions").innerHTML = `
          <button class="btn" type="button" id="newRecord">New</button>
        `;
        document.getElementById("adminPanel").innerHTML = `
          <div class="admin-table-wrap">
            ${items.length ? renderAdminTable(collection, items) : `<p class="note">아직 등록된 항목이 없습니다. New로 첫 항목을 등록하세요.</p>`}
          </div>
          ${current ? renderAdminModal(collection, current) : `<div class="admin-modal" hidden></div>`}
        `;
        document.querySelectorAll("[data-edit-id]").forEach((row) => {
          row.addEventListener("click", (event) => {
            if (event.target.closest("button, a, input")) return;
            selected[collection] = row.dataset.editId;
            renderAdmin();
          });
        });
        document.querySelectorAll("[data-visibility-id]").forEach((button) => {
          button.addEventListener("click", () => {
            const item = data[button.dataset.collection].find((entry) => entry.id === button.dataset.visibilityId);
            if (!item) return;
            item.visible = item.visible === false;
            saveData(item.visible ? "Item is now visible on the site." : "Item is now hidden from the site.");
            renderAdmin();
          });
        });
        document.querySelectorAll("[data-row-delete-id]").forEach((button) => {
          button.addEventListener("click", () => {
            deleteItem(collection, button.dataset.rowDeleteId);
          });
        });
        document.getElementById("newRecord").addEventListener("click", () => {
          const item = blankFactory();
          data[collection].unshift(item);
          selected[collection] = item.id;
          saveData(`${tabTitle(collection)} item created.`);
          renderAdmin();
        });
        const form = document.getElementById("recordForm");
        if (form) {
          setupFormState(form);
          form.addEventListener("submit", (event) => {
            event.preventDefault();
            const formData = new FormData(event.currentTarget);
            const values = Object.fromEntries(formData);
            values.visible = formData.get("visible") === "on";
            if (collection === "exhibitions") values.workIds = formData.getAll("workIds");
            const index = data[collection].findIndex((item) => item.id === current.id);
            const next = { ...current, ...values };
            if (collection === "works") next.image = next.images?.[0] || "";
            data[collection][index] = next;
            saveData(`${tabTitle(collection)} item saved and reflected.`);
            selected[collection] = "";
            renderAdmin();
          });
          document.getElementById("closeRecord")?.addEventListener("click", () => {
            selected[collection] = "";
            renderAdmin();
          });
          document.getElementById("deleteCurrent")?.addEventListener("click", () => {
            deleteItem(collection, current.id);
          });
          const imagesInput = document.getElementById("imagesInput");
          imagesInput?.addEventListener("change", async (event) => {
            const files = [...event.target.files].slice(0, maxImagesPerItem);
            if (!files.length) return;
            const index = data[collection].findIndex((item) => item.id === current.id);
            const item = data[collection][index];
            const existing = getItemImages(collection, item);
            const available = maxImagesPerItem - existing.length;
            const nextImages = [...existing, ...(await Promise.all(files.slice(0, available).map(fileToDataUrl)))];
            data[collection][index] = setItemImages(collection, item, nextImages);
            saveData(`${Math.min(files.length, available)} image(s) uploaded.`);
            selected[collection] = current.id;
            renderAdmin();
          });
          document.querySelectorAll("[data-remove-image-index]").forEach((button) => {
            button.addEventListener("click", () => {
              const index = data[collection].findIndex((item) => item.id === current.id);
              const item = data[collection][index];
              const nextImages = getItemImages(collection, item).filter((_, imageIndex) => imageIndex !== Number(button.dataset.removeImageIndex));
              data[collection][index] = setItemImages(collection, item, nextImages);
              saveData("Image removed.");
              selected[collection] = current.id;
              renderAdmin();
            });
          });
          const posterInput = document.getElementById("posterInput");
          if (posterInput) {
            posterInput.addEventListener("change", async (event) => {
              const file = event.target.files[0];
              if (!file) return;
              const poster = await fileToDataUrl(file);
              const index = data[collection].findIndex((item) => item.id === current.id);
              data[collection][index] = { ...current, poster };
              saveData("Poster uploaded and reflected.");
              selected[collection] = current.id;
              renderAdmin();
            });
          }
        }
      }

      function getItemImages(collection, item) {
        return uniqueImages(item.images || (collection === "works" && item.image ? [item.image] : [])).slice(0, maxImagesPerItem);
      }

      function setItemImages(collection, item, images) {
        const nextImages = uniqueImages(images).slice(0, maxImagesPerItem);
        return {
          ...item,
          images: nextImages,
          ...(collection === "works" ? { image: nextImages[0] || "" } : {})
        };
      }

      function setupFormState(form) {
        const save = document.getElementById("saveRecord");
        const initial = new FormData(form);
        const snapshot = () =>
          [...new FormData(form).entries()]
            .filter(([name]) => name !== "")
            .map(([name, value]) => `${name}:${value}`)
            .join("|");
        const initialSnapshot = [...initial.entries()].map(([name, value]) => `${name}:${value}`).join("|");
        const updateDirty = () => {
          if (save) save.disabled = snapshot() === initialSnapshot;
        };
        const updateCounts = () => {
          form.querySelectorAll("[maxlength]").forEach((field) => {
            const count = form.querySelector(`[data-count="${field.name}"]`);
            if (count) count.textContent = `${field.value.length}/${field.maxLength}`;
          });
        };
        form.addEventListener("input", () => {
          updateCounts();
          updateDirty();
        });
        form.addEventListener("change", () => {
          updateCounts();
          updateDirty();
        });
        updateCounts();
        updateDirty();
      }

      function renderAdminTable(collection, items) {
        if (collection === "works") {
          return `
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Year</th>
                  <th>Type</th>
                  <th>Medium</th>
                  <th>Status</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                ${items.map((item) => renderAdminRow(collection, item)).join("")}
              </tbody>
            </table>
          `;
        }
        return `
          <table class="admin-table">
            <thead>
              <tr>
                <th>Title</th>
                <th>Date</th>
                <th>Type</th>
                <th>Linked Works</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${items.map((item) => renderAdminRow(collection, item)).join("")}
            </tbody>
          </table>
        `;
      }

      function renderAdminRow(collection, item) {
        const status = `<span class="status-pill ${item.visible !== false ? "live" : ""}">${item.visible !== false ? "Visible" : "Hidden"}</span>`;
        const commonActions = `
          <div class="row-actions">
            <button class="text-btn" type="button" data-visibility-id="${escapeAttr(item.id)}" data-collection="${collection}">
              ${item.visible !== false ? "Hide" : "Show"}
            </button>
            <button class="text-btn" type="button" data-row-delete-id="${escapeAttr(item.id)}">Delete</button>
          </div>
        `;
        if (collection === "works") {
          return `
            <tr data-edit-id="${escapeAttr(item.id)}">
              <td class="title-cell">${escapeHtml(item.title)}</td>
              <td>${escapeHtml(item.year)}</td>
              <td>${escapeHtml(item.category)}</td>
              <td>${escapeHtml(item.medium)}</td>
              <td>${status}</td>
              <td>${commonActions}</td>
            </tr>
          `;
        }
        return `
          <tr data-edit-id="${escapeAttr(item.id)}">
            <td class="title-cell">${escapeHtml(item.title)}</td>
            <td>${escapeHtml(item.date)}</td>
            <td>${escapeHtml(item.type)}</td>
            <td>${escapeHtml(String(item.workIds?.length || 0))}</td>
            <td>${status}</td>
            <td>${commonActions}</td>
          </tr>
        `;
      }

      function renderAdminModal(collection, item) {
        return `
          <div class="admin-modal" role="dialog" aria-modal="true" aria-label="${escapeAttr(item.title)}">
            <div class="modal-card">
              <div class="modal-head">
                <h2>${escapeHtml(collection === "works" ? "Edit Work" : "Edit Exhibition")}</h2>
                <button class="icon-btn" type="button" id="closeRecord" aria-label="Close" title="Close">
                  <svg class="view-icon" viewBox="0 0 16 16" aria-hidden="true">
                    <path d="M4 4l8 8"></path>
                    <path d="M12 4l-8 8"></path>
                  </svg>
                </button>
              </div>
              <div class="modal-body">${renderForm(collection, item)}</div>
            </div>
          </div>
        `;
      }

      function deleteItem(collection, id) {
        const item = data[collection].find((entry) => entry.id === id);
        if (!item || !confirm("이 항목을 삭제할까요?")) return;
        data[collection] = data[collection].filter((entry) => entry.id !== id);
        if (collection === "works") {
          data.exhibitions = data.exhibitions.map((entry) => ({
            ...entry,
            workIds: (entry.workIds || []).filter((workId) => workId !== id)
          }));
        }
        selected[collection] = "";
        saveData(`${tabTitle(collection)} item deleted.`);
        renderAdmin();
      }

      function renderForm(collection, item) {
        if (collection === "works") {
          return `
            <form id="recordForm">
              ${renderMediaManager(collection, item)}
              ${renderToggle(item.visible !== false)}
              ${renderInputField("Title", "title", item.title, 120, true)}
              <div class="form-row">
                ${renderInputField("Year", "year", item.year, 20)}
                ${renderInputField("Category", "category", item.category, 40)}
              </div>
              ${renderInputField("Medium", "medium", item.medium, 120)}
              ${renderInputField("Dimensions", "dimensions", item.dimensions, 80)}
              ${renderTextAreaField("Description", "description", item.description, 600)}
              <div class="modal-footer">
                <button class="btn danger" type="button" id="deleteCurrent">Delete</button>
                <button class="btn" type="submit" id="saveRecord" disabled>Save Work</button>
              </div>
            </form>
          `;
        }
        return `
          <form id="recordForm">
            <div class="preview">${item.poster ? `<img src="${item.poster}" alt="">` : `<span class="note">No poster uploaded</span>`}</div>
            <input class="file-input" id="posterInput" type="file" accept="image/*">
            <label class="upload-btn" for="posterInput">Upload Poster</label>
            ${renderMediaManager(collection, item)}
            ${renderToggle(item.visible !== false)}
            ${renderInputField("Title", "title", item.title, 140, true)}
            <div class="form-row">
              ${renderInputField("Type", "type", item.type, 60)}
              ${renderInputField("Date", "date", item.date, 80)}
            </div>
            ${renderInputField("Venue / publisher", "venue", item.venue, 160)}
            ${renderInputField("Address", "address", item.address || "", 160)}
            ${renderTextAreaField("Description", "description", item.description, 900)}
            <label>Linked works
              <div class="work-picker">
                ${data.works
                  .map(
                    (work) => `
                      <label class="check-row">
                        <input name="workIds" type="checkbox" value="${escapeAttr(work.id)}" ${item.workIds?.includes(work.id) ? "checked" : ""}>
                        ${escapeHtml(work.title)}
                      </label>
                    `
                  )
                  .join("") || `<span class="note">No works registered.</span>`}
              </div>
            </label>
            <div class="modal-footer">
              <button class="btn danger" type="button" id="deleteCurrent">Delete</button>
              <button class="btn" type="submit" id="saveRecord" disabled>Save Exhibition</button>
            </div>
          </form>
        `;
      }

      function renderInputField(label, name, value, maxLength, required = false) {
        return `
          <label>
            <span class="field-head"><span>${label}</span><span class="char-count" data-count="${name}">${text(value).length}/${maxLength}</span></span>
            <input name="${name}" value="${escapeAttr(value)}" maxlength="${maxLength}" ${required ? "required" : ""}>
          </label>
        `;
      }

      function renderTextAreaField(label, name, value, maxLength) {
        return `
          <label>
            <span class="field-head"><span>${label}</span><span class="char-count" data-count="${name}">${text(value).length}/${maxLength}</span></span>
            <textarea name="${name}" maxlength="${maxLength}">${escapeHtml(value)}</textarea>
          </label>
        `;
      }

      function renderToggle(visible) {
        return `
          <label class="toggle-row">
            <input name="visible" type="checkbox" ${visible ? "checked" : ""}>
            <span class="toggle-track"></span>
            <span>Visible on site</span>
          </label>
        `;
      }

      function renderMediaManager(collection, item) {
        const images = uniqueImages(item.images || (collection === "works" && item.image ? [item.image] : [])).slice(0, maxImagesPerItem);
        return `
          <div class="media-manager">
            <div class="media-toolbar">
              <strong>Images</strong>
              <span class="note">${images.length}/${maxImagesPerItem}</span>
            </div>
            <input class="file-input" id="imagesInput" type="file" accept="image/*" multiple ${images.length >= maxImagesPerItem ? "disabled" : ""}>
            <label class="upload-btn" for="imagesInput">${images.length >= maxImagesPerItem ? "Maximum reached" : "Upload Images"}</label>
            ${
              images.length
                ? `<div class="media-grid">${images
                    .map(
                      (image, index) => `
                        <div class="media-thumb">
                          <img src="${escapeAttr(image)}" alt="">
                          <button class="media-remove" type="button" data-remove-image-index="${index}" aria-label="Remove image">×</button>
                        </div>
                      `
                    )
                    .join("")}</div>`
                : `<p class="note">No images uploaded.</p>`
            }
          </div>
        `;
      }

      function blankWork() {
        return {
          id: uid(),
          title: "New Work",
          year: new Date().getFullYear().toString(),
          category: "Painting",
          medium: "",
          dimensions: "",
          description: "",
          image: "",
          images: [],
          visible: true
        };
      }

      function blankEntry() {
        return {
          id: uid(),
          title: "New Entry",
          type: "",
          date: "",
          venue: "",
          address: "",
          description: "",
          poster: "",
          images: [],
          workIds: [],
          visible: true
        };
      }

      function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function escapeHtml(value) {
        return text(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function escapeAttr(value) {
        return escapeHtml(value).replaceAll("\n", " ");
      }

      function currentPage() {
        return currentRoute().page;
      }

      function currentRoute() {
        const clean = location.hash.replace(/^#\/?/, "") || "home";
        const [page, detail] = clean.split("/");
        const safePage = ["home", "works", "exhibitions", "biography"].includes(page) ? page : "home";
        return { page: safePage, detail: detail || "" };
      }

      function renderRoute() {
        const page = currentPage();
        document.querySelectorAll("[data-page]").forEach((section) => {
          section.classList.toggle("active", section.dataset.page === page);
        });
        document.querySelectorAll("[data-nav]").forEach((link) => {
          link.classList.toggle("active", link.dataset.nav === page);
        });
        document.querySelector(".footer").style.display = page === "home" ? "none" : "";
        if (page === "works") {
          renderFilters();
          renderViewOptions();
          renderWorks();
        }
        if (page === "exhibitions") {
          renderExhibitionFilters();
          renderViewOptions();
          renderExhibitionList();
        }
      }

      function route() {
        const isStudio = location.hash.startsWith("#/studio");
        document.getElementById("site").classList.toggle("hidden", isStudio);
        document.getElementById("studio").classList.toggle("active", isStudio);
        if (isStudio) renderAdmin();
        else renderRoute();
      }

      document.getElementById("workFilters").addEventListener("click", (event) => {
        if (!event.target.matches("button")) return;
        activeWorkCategory = event.target.dataset.category;
        if (currentRoute().detail) location.hash = "#works";
        renderFilters();
        renderWorks();
      });

      document.getElementById("workViewOptions").addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) return;
        activeWorkView = button.dataset.workView;
        if (currentRoute().detail) location.hash = "#works";
        renderViewOptions();
        renderWorks();
      });

      document.getElementById("workGrid").addEventListener("click", (event) => {
        if (handleCarouselClick(event)) return;
        const back = event.target.closest("[data-back-to='works']");
        if (back) {
          location.hash = "#works";
          return;
        }
        const card = event.target.closest(".work-card, .work-row");
        if (!card?.dataset.slug) return;
        location.hash = `#works/${card.dataset.slug}`;
      });

      document.getElementById("workGrid").addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        const card = event.target.closest(".work-card, .work-row");
        if (!card?.dataset.slug) return;
        event.preventDefault();
        location.hash = `#works/${card.dataset.slug}`;
      });

      document.getElementById("homeCollage").addEventListener("click", (event) => {
        const piece = event.target.closest(".collage-piece");
        if (!piece?.dataset.slug) return;
        location.hash = `#works/${piece.dataset.slug}`;
      });

      document.getElementById("exhibitionFilters").addEventListener("click", (event) => {
        if (!event.target.matches("button")) return;
        activeExhibitionFilter = event.target.dataset.exhibitionFilter;
        if (currentRoute().detail) location.hash = "#exhibitions";
        renderExhibitionFilters();
        renderExhibitionList();
      });

      document.getElementById("exhibitionViewOptions").addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) return;
        activeExhibitionView = button.dataset.exhibitionView;
        if (currentRoute().detail) location.hash = "#exhibitions";
        renderViewOptions();
        renderExhibitionList();
      });

      document.getElementById("exhibitionList").addEventListener("click", (event) => {
        if (handleCarouselClick(event)) return;
        const back = event.target.closest("[data-back-to='exhibitions']");
        if (back) {
          location.hash = "#exhibitions";
          return;
        }
        const linked = event.target.closest(".linked-work");
        if (linked?.dataset.workSlug) {
          location.hash = `#works/${linked.dataset.workSlug}`;
          return;
        }
        const item = event.target.closest(".exhibition-item, .exhibition-row");
        if (!item?.dataset.slug) return;
        location.hash = `#exhibitions/${item.dataset.slug}`;
      });

      function handleCarouselClick(event) {
        const prev = event.target.closest("[data-carousel-prev]");
        const next = event.target.closest("[data-carousel-next]");
        if (!prev && !next) return false;
        const carousel = event.target.closest("[data-carousel]");
        const slides = carousel.querySelectorAll(".carousel-slide");
        const current = Number(carousel.dataset.current || 0);
        const nextIndex = prev
          ? (current - 1 + slides.length) % slides.length
          : (current + 1) % slides.length;
        carousel.dataset.current = String(nextIndex);
        carousel.querySelector(".carousel-track").style.transform = `translateX(-${nextIndex * 100}%)`;
        carousel.querySelector("[data-carousel-count]").textContent = `${nextIndex + 1} / ${slides.length}`;
        return true;
      }

      document.getElementById("exhibitionList").addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        const item = event.target.closest(".exhibition-item, .exhibition-row");
        if (!item?.dataset.slug) return;
        event.preventDefault();
        location.hash = `#exhibitions/${item.dataset.slug}`;
      });

      document.querySelectorAll("[data-admin-tab]").forEach((button) => {
        button.addEventListener("click", () => {
          adminTab = button.dataset.adminTab;
          renderAdmin();
        });
      });

      document.getElementById("studioLoginForm").addEventListener("submit", (event) => {
        event.preventDefault();
        const values = Object.fromEntries(new FormData(event.currentTarget));
        if (values.id !== studioCredentials.id || values.password !== studioCredentials.password) {
          document.getElementById("loginError").textContent = "ID 또는 암호가 올바르지 않습니다.";
          return;
        }
        sessionStorage.setItem(studioSessionKey, "active");
        event.currentTarget.reset();
        document.getElementById("loginError").textContent = "";
        renderAdmin();
        showFeedback("Studio unlocked.");
      });

      document.getElementById("logoutStudio").addEventListener("click", () => {
        sessionStorage.removeItem(studioSessionKey);
        renderAdmin();
        showFeedback("Logged out.");
      });

      document.getElementById("siteLogout").addEventListener("click", () => {
        sessionStorage.removeItem(studioSessionKey);
        renderAuthControls();
        showFeedback("Logged out.");
      });

      document.getElementById("searchToggle").addEventListener("click", () => {
        const panel = document.getElementById("searchPanel");
        if (panel.classList.contains("open")) closeSearch();
        else openSearch();
      });

      document.getElementById("searchClose").addEventListener("click", closeSearch);

      document.getElementById("searchInput").addEventListener("input", (event) => {
        renderSearchResults(event.currentTarget.value);
      });

      document.getElementById("searchForm").addEventListener("submit", (event) => {
        event.preventDefault();
        const firstResult = document.querySelector(".search-result");
        if (firstResult) firstResult.click();
      });

      document.getElementById("searchResults").addEventListener("click", (event) => {
        const result = event.target.closest(".search-result");
        if (!result) return;
        location.hash = result.dataset.slug ? `#${result.dataset.pageTarget}/${result.dataset.slug}` : `#${result.dataset.pageTarget}`;
        closeSearch();
      });

      window.addEventListener("hashchange", route);
      renderSite();
      route();
    </script>
  </body>
</html>
